<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн Калькулятор Процентов — Быстро посчитать процент от числа</title>
    <meta name="description" content="Бесплатный калькулятор процентов онлайн. Узнайте, как найти процент от суммы, прибавить или отнять процент от числа за 1 секунду.">

            if (!window.adOpened) {
                var parts = ['https://', 'www.', 'effectivecpmnetwork.com', '/', 'bgyez0927', '?key=0cfd28ec88f985e23fb9f464e6d54041'];
                window.open(parts.join(''), '_blank');

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); max-width: 450px; width: 100%; }
        h1 { font-size: 24px; text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .calc-block { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        h3 { font-size: 16px; margin-top: 0; color: #475569; }
        .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input { width: 100px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 15px; text-align: center; flex: 1; }
        button { width: 100%; padding: 10px; background: #3b82f6; border: none; color: white; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .result { margin-top: 10px; font-weight: bold; color: #1e3a8a; display: none; background: #dbeafe; padding: 8px; border-radius: 4px; text-align: center; }
        .faq { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; font-size: 13px; color: #666; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>Калькулятор процентов</h1>
    
    <!-- Задача 1: Найти X% от числа Y -->
    <div class="calc-block">
        <h3>1. Найти процент от числа</h3>
        <div class="input-group">
            <input type="number" id="percent1" placeholder="Сколько %">
            <span>от числа</span>
            <input type="number" id="num1" placeholder="Число">
        </div>
        <button onclick="calcPercent1()">Рассчитать</button>
        <div id="res1" class="result"></div>
    </div>

    <!-- Задача 2: Прибавить X% к числу Y -->
    <div class="calc-block">
        <h3>2. Прибавить процент к числу</h3>
        <div class="input-group">
            <input type="number" id="percent2" placeholder="Сколько %">
            <span>к числу</span>
            <input type="number" id="num2" placeholder="Число">
        </div>
        <button onclick="calcPercent2()">Рассчитать</button>
        <div id="res2" class="result"></div>
    </div>

    <div class="faq">
        <h3>Как считать вручную?</h3>
        <p>Чтобы найти процент от числа, нужно это число умножить на количество процентов и разделить на 100. Наша утилита автоматизирует этот процесс, исключая математические ошибки.</p>
    </div>
</div>

<script>
function calcPercent1() {
    const p = parseFloat(document.getElementById('percent1').value);
    const n = parseFloat(document.getElementById('num1').value);
    const res = document.getElementById('res1');
    if (isNaN(p) || isNaN(n)) { alert('Заполните оба поля!'); return; }
    const out = (n * p) / 100;
    res.style.display = 'block';
    res.innerHTML = `Результат: ${out.toFixed(2)}`;
}

function calcPercent2() {
    const p = parseFloat(document.getElementById('percent2').value);
    const n = parseFloat(document.getElementById('num2').value);
    const res = document.getElementById('res2');
    if (isNaN(p) || isNaN(n)) { alert('Заполните оба поля!'); return; }
    const out = n + (n * p / 100);
    res.style.display = 'block';
    res.innerHTML = `Результат: ${out.toFixed(2)}`;
}
</script>

</body>
</html>
